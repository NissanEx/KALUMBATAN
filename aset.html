<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ExSan - Informasi Aset</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        'brand-dark': '#1a1a1a',
                        'star-yellow': '#f59e0b',
                        'review-bg': '#f8f9fa',
                    },
                },
            },
        };
    </script>

    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .bg-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(60, 60, 60, 0.7);
            backdrop-filter: blur(4px);
            z-index: -1;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* ===== NAVIGASI AKTIF (SERAGAM) ===== */
        .desktop-nav-link-active {
            color: black !important;
            font-weight: 700 !important;
            border-bottom: 2px solid black !important;
            padding-bottom: 4px;
        }
        .mobile-nav-link-active {
            color: white !important;
            border-bottom: 2px solid white !important;
            padding-bottom: 4px;
        }

        /* Review card - minimal clean style */
        .review-card {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 1.25rem;
        }
        .review-card:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        /* Star rating interactive */
        .star-interactive i {
            cursor: pointer;
            transition: color 0.15s;
            color: #d1d5db;
        }
        .star-interactive i:hover,
        .star-interactive i.hovered,
        .star-interactive i.selected {
            color: #f59e0b;
        }

        /* Detail info chip */
        .info-chip {
            background: #f8fafc;
            border: 1px solid #e8ecf0;
            border-radius: 10px;
            padding: 0.5rem 0.875rem;
        }

        .asset-card {
            transition: background 0.15s ease;
            cursor: pointer;
        }
        .asset-card:hover {
            background: #f8fafc;
        }
        .asset-card.active {
            background: #f1f5f9;
        }

        /* Mobile Sidebar Bottom */
        .sidebar-bottom-mobile {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.5rem 0.25rem;
            width: 100%;
        }
        .sidebar-bottom-mobile button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.6rem;
            color: #6b7280;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        .sidebar-bottom-mobile button.active {
            color: #111827;
            font-weight: 600;
            background-color: #f3f4f6;
        }
        .sidebar-bottom-mobile button i { font-size: 1.2rem; margin-bottom: 0.2rem; }

        @media (min-width: 1024px) {
            .main-grid {
                display: grid;
                grid-template-columns: 260px minmax(300px, 1fr) minmax(400px, 1.2fr);
                gap: 1.5rem;
                height: calc(100vh - 100px);
            }
        }
    </style>
</head>

<body class="antialiased text-gray-800 font-sans min-h-screen flex flex-col overflow-hidden">
    <div class="bg-overlay"></div>

    <!-- ============================================================ -->
    <!-- HEADER (SERAGAM DENGAN INDEX, APBDES, STRUKTUR, PRIMER)      -->
    <!-- ============================================================ -->
    <header class="sticky top-0 w-full bg-white shadow-md z-50">
        <div class="w-full max-w-[1800px] mx-auto flex justify-between items-center py-3 md:py-5 px-4 md:px-10 xl:px-16">
            <a href="index.html" class="text-xl md:text-3xl lg:text-4xl font-black tracking-tighter text-black">ExSan</a>
            <!-- Desktop Nav: Home → APBDes → Struktur → Primer → Aset → Laporan -->
            <nav class="hidden md:flex space-x-6 lg:space-x-8 items-center text-xs lg:text-sm font-medium text-gray-700">
                <a href="index.html" class="hover:text-black transition flex items-center gap-1.5">
                    <i class="fa-solid fa-house text-sm"></i> Home
                </a>
                <a href="apbdes.html" class="hover:text-black transition">APBDes</a>
                <a href="struktur.html" class="hover:text-black transition">Struktur</a>
                <a href="primer.html" class="hover:text-black transition">Primer</a>
                <a href="#" class="desktop-nav-link-active">Aset</a>
                <a href="laporan.html" class="hover:text-black transition">Laporan</a>
            </nav>
            <button onclick="toggleMobileMenu()" class="md:hidden text-2xl text-black focus:outline-none z-50">
                <i id="menu-icon" class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- MOBILE MENU OVERLAY (SERAGAM)                                -->
    <!-- ============================================================ -->
    <div id="mobile-menu" class="fixed inset-0 bg-black/95 z-40 translate-x-full transition-transform duration-300 md:hidden flex flex-col justify-center items-center space-y-6 text-xl font-medium text-white">
        <a href="index.html" onclick="toggleMobileMenu()" class="hover:text-gray-400 transition tracking-wider flex items-center gap-2">
            <i class="fa-solid fa-house text-lg"></i> Home
        </a>
        <a href="apbdes.html" onclick="toggleMobileMenu()" class="hover:text-gray-400 transition tracking-wider">APBDes</a>
        <a href="struktur.html" onclick="toggleMobileMenu()" class="hover:text-gray-400 transition tracking-wider">Struktur</a>
        <a href="primer.html" onclick="toggleMobileMenu()" class="hover:text-gray-400 transition tracking-wider">Primer</a>
        <a href="#" onclick="toggleMobileMenu()" class="mobile-nav-link-active tracking-wider">Aset</a>
        <a href="laporan.html" onclick="toggleMobileMenu()" class="hover:text-gray-400 transition tracking-wider">Laporan</a>
    </div>

    <!-- ============================================================ -->
    <!-- MAIN CONTENT                                                 -->
    <!-- ============================================================ -->
    <main class="flex-1 w-full max-w-[1800px] mx-auto p-4 md:p-6 lg:p-8 flex flex-col min-h-0">
        
        <div class="main-grid flex flex-col lg:grid w-full h-full pb-20 lg:pb-0 gap-6">

            <!-- ========================================== -->
            <!-- KOLOM 1: SIDEBAR KATEGORI                  -->
            <!-- ========================================== -->
            <aside class="hidden lg:flex flex-col bg-white rounded-3xl p-6 shadow-xl h-full shrink-0">
                <h3 class="text-gray-500 font-medium mb-6 px-4">Kategori</h3>
                <ul class="space-y-2 flex-1 overflow-y-auto custom-scrollbar pr-2" id="desktop-category-list">
                    <!-- Injected by JS -->
                </ul>
            </aside>

            <!-- ========================================== -->
            <!-- KOLOM 2: DAFTAR ASET (TENGAH)              -->
            <!-- ========================================== -->
            <section class="flex flex-col bg-white rounded-3xl p-5 md:p-6 shadow-xl h-full overflow-hidden">
                
                <div class="flex items-center gap-3 mb-6">
                    <div class="flex-1 flex items-center bg-transparent border border-gray-300 rounded-full px-4 py-2 hover:border-gray-400 transition-colors focus-within:border-black focus-within:ring-1 focus-within:ring-black">
                        <input type="text" placeholder="Cari berdasarkan Nama" class="w-full bg-transparent outline-none text-sm text-gray-700" />
                    </div>
                    <button class="text-gray-500 hover:text-black transition text-lg"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <button class="text-gray-500 hover:text-black transition text-xl ml-2"><i class="fa-solid fa-headset"></i></button>
                </div>

                <h2 id="middle-category-title" class="text-lg font-semibold text-gray-900 mb-4 px-1">Kekayaan Asli Desa</h2>

                <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-4">
                    <div id="asset-list-container" class="flex flex-col gap-3">
                        <!-- Asset cards injected -->
                    </div>
                </div>
            </section>

            <!-- ========================================== -->
            <!-- KOLOM 3: INFORMASI ASET (KANAN / MODAL)    -->
            <!-- ========================================== -->
            <section id="asset-detail-panel" class="fixed inset-0 z-50 bg-black/60 p-4 flex justify-center items-center lg:relative lg:inset-auto lg:bg-white lg:p-6 lg:z-auto lg:rounded-3xl lg:shadow-xl transition-opacity duration-300 opacity-0 pointer-events-none lg:opacity-100 lg:pointer-events-auto h-full overflow-hidden flex-col">
                
                <div class="bg-white rounded-3xl p-5 md:p-6 w-full max-w-2xl max-h-[90vh] lg:max-h-full flex flex-col relative overflow-hidden transform scale-95 transition-transform duration-300 lg:scale-100 lg:p-0 lg:shadow-none lg:rounded-none lg:overflow-visible h-full">
                    
                    <button onclick="closeDetailPanel()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 lg:hidden z-10">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>

                    <h2 class="text-xl font-bold text-gray-900 mb-5 pb-3 border-b border-gray-100 lg:border-none flex items-center gap-2">
                        <i class="fa-solid fa-layer-group text-gray-400 text-base"></i>
                        Informasi Aset
                    </h2>

                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-1 flex flex-col gap-5" id="detail-content-area">
                        
                        <!-- Asset image + basic info -->
                        <div class="flex gap-4 items-start">
                            <div class="w-28 h-28 shrink-0 rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                                <img id="detail-image" src="" alt="Aset" class="w-full h-full object-cover" />
                            </div>
                            <div class="flex-1 flex flex-col gap-2 min-w-0">
                                <span id="detail-nama" class="font-bold text-gray-900 text-base leading-snug"></span>
                                <span id="detail-kategori" class="text-xs font-medium text-gray-400 uppercase tracking-wide"></span>
                                <div id="detail-stars" class="flex gap-0.5 text-star-yellow text-sm my-0.5"></div>
                                <div class="flex flex-wrap gap-2 mt-1">
                                    <span class="info-chip text-xs text-gray-600 flex items-center gap-1.5">
                                        <i class="fa-solid fa-cubes-stacked text-gray-400 text-[10px]"></i>
                                        <span id="detail-jumlah"></span>
                                    </span>
                                    <span class="info-chip text-xs text-gray-600 flex items-center gap-1.5">
                                        <i class="fa-solid fa-circle-info text-gray-400 text-[10px]"></i>
                                        <span id="detail-fungsi"></span>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Divider + Review section -->
                        <div class="flex flex-col gap-1">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-sm font-semibold text-gray-800">Ulasan Warga</span>
                                <span id="review-count" class="text-xs text-gray-400"></span>
                            </div>
                            <div id="detail-reviews" class="flex flex-col gap-4"></div>
                        </div>

                        <!-- Write review input -->
                        <div class="mt-2 mb-1">
                            <div class="text-xs font-semibold text-gray-700 mb-2">Tulis Ulasan</div>
                            <div class="border border-gray-200 rounded-2xl overflow-hidden bg-white shadow-sm">
                                <textarea rows="3" class="w-full outline-none text-sm text-gray-800 placeholder-gray-400 resize-none px-4 pt-3 pb-2 bg-transparent" placeholder="Bagikan pendapat Anda tentang aset ini..."></textarea>
                                <div class="flex items-center justify-between px-4 pb-3 pt-1 border-t border-gray-100">
                                    <div class="flex items-center gap-1.5">
                                        <span class="text-xs text-gray-400 mr-1">Rating:</span>
                                        <div class="star-interactive flex gap-0.5 text-base" id="star-input">
                                            <i class="fa-solid fa-star" data-val="1"></i>
                                            <i class="fa-solid fa-star" data-val="2"></i>
                                            <i class="fa-solid fa-star" data-val="3"></i>
                                            <i class="fa-solid fa-star" data-val="4"></i>
                                            <i class="fa-solid fa-star" data-val="5"></i>
                                        </div>
                                    </div>
                                    <button class="bg-gray-900 hover:bg-gray-700 text-white text-xs font-semibold px-4 py-1.5 rounded-full transition-colors">
                                        Kirim
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <aside class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-40 lg:hidden">
        <div class="sidebar-bottom-mobile" id="mobile-category-list">
            <!-- Injected by JS -->
        </div>
    </aside>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT                                                    -->
    <!-- ============================================================ -->
    <script>
        // ==========================================
        // TOGGLE MOBILE MENU (SERAGAM)
        // ==========================================
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            menu.classList.toggle('translate-x-full');
            icon.classList.toggle('fa-xmark');
            icon.classList.toggle('fa-bars');
        }

        // ==========================================
        // DATA DUMMY
        // ==========================================
        const categories = [
            { id: 'dashboard', icon: 'fa-house', title: 'Dashboard' },
            { id: 'asli', icon: 'fa-landmark', title: 'Kekayaan Asli Desa' },
            { id: 'beli', icon: 'fa-cart-shopping', title: 'Kekayaan yang Dibeli' },
            { id: 'hibah', icon: 'fa-gift', title: 'Kekayaan dari Hibah dan Sumbangan' },
            { id: 'kontrak', icon: 'fa-file-signature', title: 'Kekayaan dari Perjanjian / Kontrak' }
        ];

        const asetData = [
            { 
                id: 1, kategoriId: 'asli', kategori: 'Kekayaan Asli Desa', nama: 'Tanah Kas Desa - Blok A', jumlah: '12 Hektar', fungsi: 'Pertanian Terpadu', 
                image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&h=600&fit=crop', rating: 5,
                reviews: [
                    { user: 'Sandy', role: 'Mahasiswa', text: 'Aset Tidak di Gunakan Mending Di alih fungsikan daripada nganggur', rating: 5, avatar: 'https://ui-avatars.com/api/?name=Sandy&background=random' },
                    { user: 'Budi Raharjo', role: 'Warga', text: 'Sangat membantu perekonomian', rating: 5, avatar: 'https://ui-avatars.com/api/?name=Budi&background=random' }
                ]
            },
            { 
                id: 2, kategoriId: 'asli', kategori: 'Kekayaan Asli Desa', nama: 'Balai Pertemuan Warga', jumlah: '1 Unit', fungsi: 'Fasilitas Umum', 
                image: 'https://images.unsplash.com/photo-1577908852330-2cb0338dd895?w=600&h=600&fit=crop', rating: 4,
                reviews: [
                    { user: 'Dewi', role: 'Kader PKK', text: 'Bangunan perlu direnovasi atapnya bocor sedikit.', rating: 4, avatar: 'https://ui-avatars.com/api/?name=Dewi&background=random' }
                ]
            },
            { 
                id: 3, kategoriId: 'beli', kategori: 'Kekayaan yang Dibeli', nama: 'Traktor Pengolah Lahan', jumlah: '2 Unit', fungsi: 'Alat Pertanian', 
                image: 'https://images.unsplash.com/photo-1592982537447-6f29e248b99d?w=600&h=600&fit=crop', rating: 5,
                reviews: [
                    { user: 'Pak Tani', role: 'Ketua Poktan', text: 'Mesin masih halus dan sangat berguna musim tanam ini.', rating: 5, avatar: 'https://ui-avatars.com/api/?name=Tani&background=random' }
                ]
            },
            { 
                id: 4, kategoriId: 'hibah', kategori: 'Hibah dan Sumbangan', nama: 'Perpustakaan Desa', jumlah: '1 Bangunan', fungsi: 'Edukasi Warga', 
                image: 'https://images.unsplash.com/photo-1568667256549-094345857637?w=600&h=600&fit=crop', rating: 3,
                reviews: [
                    { user: 'Andi', role: 'Pelajar', text: 'Koleksi buku kurang lengkap dan usang.', rating: 3, avatar: 'https://ui-avatars.com/api/?name=Andi&background=random' }
                ]
            }
        ];

        // ==========================================
        // STATE
        // ==========================================
        let currentCategory = 'asli';
        let currentAssetId = null;

        // ==========================================
        // DOM ELEMENTS
        // ==========================================
        const desktopCatList = document.getElementById('desktop-category-list');
        const mobileCatList = document.getElementById('mobile-category-list');
        const assetListContainer = document.getElementById('asset-list-container');
        const midCatTitle = document.getElementById('middle-category-title');
        
        const detailPanel = document.getElementById('asset-detail-panel');
        const dImage = document.getElementById('detail-image');
        const dKategori = document.getElementById('detail-kategori');
        const dNama = document.getElementById('detail-nama');
        const dJumlah = document.getElementById('detail-jumlah');
        const dFungsi = document.getElementById('detail-fungsi');
        const dStars = document.getElementById('detail-stars');
        const dReviews = document.getElementById('detail-reviews');

        // ==========================================
        // FUNCTIONS
        // ==========================================
        function generateStarsHTML(rating, sizeClass = 'text-sm') {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    html += `<i class="fa-solid fa-star ${sizeClass} text-star-yellow"></i>`;
                } else {
                    html += `<i class="fa-regular fa-star ${sizeClass} text-gray-300"></i>`;
                }
            }
            return html;
        }

        function renderCategories() {
            desktopCatList.innerHTML = categories.map(cat => `
                <li>
                    <button onclick="selectCategory('${cat.id}')" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl transition-all duration-200 text-left ${currentCategory === cat.id ? 'bg-gray-100 text-black font-bold' : 'text-gray-500 hover:bg-gray-50 font-medium'}">
                        <div class="w-8 flex justify-center"><i class="fa-solid ${cat.icon} text-lg"></i></div>
                        <span class="text-sm leading-tight">${cat.title.replace('Kekayaan dari ', '')}</span>
                    </button>
                </li>
            `).join('');

            mobileCatList.innerHTML = categories.map(cat => `
                <button onclick="selectCategory('${cat.id}')" class="${currentCategory === cat.id ? 'active' : ''}">
                    <i class="fa-solid ${cat.icon}"></i>
                    <span>${cat.id === 'dashboard' ? 'Dash' : cat.title.split(' ')[1] || cat.title.split(' ')[0]}</span>
                </button>
            `).join('');
        }

        function selectCategory(catId) {
            currentCategory = catId;
            const catInfo = categories.find(c => c.id === catId);
            midCatTitle.textContent = catInfo.title;
            renderCategories();
            renderAssetList();
        }

        function renderAssetList() {
            let filtered = asetData;
            if (currentCategory !== 'dashboard') {
                filtered = asetData.filter(a => a.kategoriId === currentCategory);
            }

            if (filtered.length === 0) {
                assetListContainer.innerHTML = `<div class="py-10 text-center text-gray-400 text-sm">Tidak ada aset dalam kategori ini.</div>`;
                return;
            }

            assetListContainer.innerHTML = filtered.map(item => `
                <div onclick="selectAsset(${item.id})" class="asset-card flex gap-4 items-center rounded-2xl p-3 bg-white">
                    <div class="w-24 h-24 sm:w-28 sm:h-28 shrink-0 rounded-xl overflow-hidden shadow-sm">
                        <img src="${item.image}" alt="${item.nama}" class="w-full h-full object-cover transition-transform duration-300 hover:scale-105" loading="lazy" />
                    </div>
                    <div class="flex flex-col flex-1">
                        <h4 class="font-bold text-gray-900 text-sm sm:text-base leading-tight mb-1">${item.nama}</h4>
                        <span class="text-xs text-gray-400 mb-2">${item.kategori}</span>
                        <span class="text-xs sm:text-sm text-gray-700 font-medium">${item.fungsi} &bull; ${item.jumlah}</span>
                        <div class="flex gap-1 mt-2">${generateStarsHTML(item.rating, 'text-[10px] sm:text-xs')}</div>
                    </div>
                </div>
            `).join('');

            if (filtered.length > 0 && (!currentAssetId || !filtered.find(a => a.id === currentAssetId))) {
                if (window.innerWidth >= 1024) {
                    selectAsset(filtered[0].id, false);
                }
            }
        }

        function selectAsset(id, openModal = true) {
            currentAssetId = id;
            const asset = asetData.find(a => a.id === id);
            
            document.querySelectorAll('.asset-card').forEach(card => card.classList.remove('active'));
            const cards = assetListContainer.children;
            const index = (currentCategory === 'dashboard' ? asetData : asetData.filter(a=>a.kategoriId === currentCategory)).findIndex(a=>a.id === id);
            if(cards[index]) {
                cards[index].classList.add('active');
            }

            dImage.src = asset.image;
            dKategori.textContent = asset.kategori;
            dNama.textContent = asset.nama;
            dJumlah.textContent = asset.jumlah;
            dFungsi.textContent = asset.fungsi;
            dStars.innerHTML = generateStarsHTML(asset.rating, 'text-lg');

            dReviews.innerHTML = asset.reviews.map(rev => `
                <div class="review-card flex gap-3 items-start">
                    <img src="${rev.avatar}" class="w-9 h-9 rounded-full object-cover shrink-0 mt-0.5 border border-gray-100" alt="${rev.user}" />
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between gap-2 mb-0.5">
                            <div>
                                <span class="font-semibold text-gray-900 text-sm">${rev.user}</span>
                                <span class="text-gray-400 text-xs ml-1.5">· ${rev.role}</span>
                            </div>
                            <div class="flex gap-0.5 text-star-yellow text-xs shrink-0">
                                ${generateStarsHTML(rev.rating, 'text-xs')}
                            </div>
                        </div>
                        <p class="text-sm text-gray-600 leading-relaxed mt-1">${rev.text}</p>
                        <button class="mt-2 flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-700 transition-colors group">
                            <i class="fa-regular fa-thumbs-up group-hover:text-gray-700"></i>
                            <span>Berguna</span>
                        </button>
                    </div>
                </div>
            `).join('');

            // Update review count
            const reviewCountEl = document.getElementById('review-count');
            if (reviewCountEl) reviewCountEl.textContent = `${asset.reviews.length} ulasan`;

            if (openModal && window.innerWidth < 1024) {
                detailPanel.classList.remove('opacity-0', 'pointer-events-none');
                detailPanel.firstElementChild.classList.remove('scale-95');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeDetailPanel() {
            detailPanel.classList.add('opacity-0', 'pointer-events-none');
            detailPanel.firstElementChild.classList.add('scale-95');
            document.body.style.overflow = '';
        }

        // ==========================================
        // INIT
        // ==========================================
        window.onload = () => {
            renderCategories();
            selectCategory('asli');
            
            detailPanel.addEventListener('click', (e) => {
                if (e.target === detailPanel) {
                    closeDetailPanel();
                }
            });

            // Star input interactivity
            const starInput = document.getElementById('star-input');
            if (starInput) {
                let selectedRating = 0;
                const stars = starInput.querySelectorAll('i');
                stars.forEach(star => {
                    star.addEventListener('mouseenter', () => {
                        const val = parseInt(star.dataset.val);
                        stars.forEach((s, i) => {
                            s.style.color = i < val ? '#f59e0b' : '#d1d5db';
                        });
                    });
                    star.addEventListener('mouseleave', () => {
                        stars.forEach((s, i) => {
                            s.style.color = i < selectedRating ? '#f59e0b' : '#d1d5db';
                        });
                    });
                    star.addEventListener('click', () => {
                        selectedRating = parseInt(star.dataset.val);
                        stars.forEach((s, i) => {
                            s.style.color = i < selectedRating ? '#f59e0b' : '#d1d5db';
                        });
                    });
                });
            }
        };

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                document.body.style.overflow = '';
                detailPanel.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                if(!detailPanel.classList.contains('pointer-events-none') && document.body.style.overflow === '') {
                    document.body.style.overflow = 'hidden';
                }
            }
        });
    </script>
</body>
</html>
